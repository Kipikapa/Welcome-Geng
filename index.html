<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Geng</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #41431B, #AEB784);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        h1 {
            font-weight: 600;
            margin-bottom: 15px;
        }

        p {
            font-weight: 300;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            border-radius: 30px;
            background: white;
            color: #427A43;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #ECE7D1;
        }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 0.8rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Halo 👋</h1>
        <p>Selamat datang di website pertama dari Kipikapa</p>
        <a href="https://instagram.com/rifqyhsni" class="btn">Instagram</a>
    </div>

    <footer>
        © 2026 - Dibuat dengan ❤️
    </footer>

</body>
</html>
